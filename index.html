
<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Israa's Portfolio</title>

    <link rel="stylesheet" href="StyleSheet.css">

    <style>

        @keyframes slide-in-ltr {

            from {
                transform: translateX(-2%);
                opacity: 0;
            }



            to {
                transform: translateX(0);
                opacity: 1;
            }
        }



        @keyframes slide-in-rtl {

            from {
                transform: translateX(3%);
                opacity: 0;
            }



            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>

</head>

<body>

    <div class="game-container">
        <div class="design-bounds">
            <img src="images/bg1.png" class="layer background-image">

            <img src="images/cloud_ltr.png" class="layer cloud-ltr"
                 style="top: 0%; left: -35%; animation: slide-in-ltr 1.5s steps(8) forwards;">
            <img src="images/cloud_rtl.png" class="layer cloud-rtl"
                 style="top: 6%; left: 35%; animation: slide-in-rtl 1.5s steps(10) forwards;">

            <img src="images/text_layer.png" class="layer text-layer">
            <img src="images/butterfly.png" class="layer butterfly">

            <a href="categories.html" class="start-link"></a>
        </div>
    </div>

</body>

</html>
